<h2 mat-dialog-title>{{data ? 'Edit' : 'Create'}} Delivery Note</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Note Number</mat-label>
      <input matInput formControlName="noteNumber">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Exit Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="exitDate">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Workshop</mat-label>
      <input matInput formControlName="workshop">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Exit Reason</mat-label>
      <mat-select formControlName="exitReason">
        <mat-option value="PRODUCTION">Production</mat-option>
        <mat-option value="MAINTENANCE">Maintenance</mat-option>
        <mat-option value="AUTRE">Other</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Comments</mat-label>
      <textarea matInput formControlName="comments" rows="2"></textarea>
    </mat-form-field>
    <h3>Delivery Lines</h3>
    <div formArrayName="deliveryNoteLines">
      @for (line of deliveryLines.controls; track $index) {
        <div [formGroupName]="$index" class="delivery-line">
          <mat-form-field appearance="outline">
            <mat-label>Product</mat-label>
            <mat-select formControlName="productId">
              @for (p of products; track p.id) {
                <mat-option [value]="p.id">{{p.reference}} - {{p.name}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity">
          </mat-form-field>
          <button mat-icon-button color="warn" type="button" (click)="removeLine($index)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      }
    </div>
    <button mat-button type="button" (click)="addLine()">
      <mat-icon>add</mat-icon> Add Line
    </button>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
