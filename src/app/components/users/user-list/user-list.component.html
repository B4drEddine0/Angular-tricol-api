<div class="page-header">
  <h1>User Management</h1>
</div>
<table mat-table [dataSource]="users" class="mat-elevation-z2">
  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef>Username</th>
    <td mat-cell *matCellDef="let u">{{u.username}}</td>
  </ng-container>
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let u">{{u.email}}</td>
  </ng-container>
  <ng-container matColumnDef="roles">
    <th mat-header-cell *matHeaderCellDef>Roles</th>
    <td mat-cell *matCellDef="let u">
      @for (role of u.roles; track role) {
        <mat-chip class="role-chip">
          {{role}}
          <button matChipRemove (click)="removeRole(u.id, role)">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip>
      }
    </td>
  </ng-container>
  <ng-container matColumnDef="enabled">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let u">
      <mat-chip [class]="u.enabled ? 'status-active' : 'status-inactive'">
        {{u.enabled ? 'Active' : 'Inactive'}}
      </mat-chip>
    </td>
  </ng-container>
  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Created</th>
    <td mat-cell *matCellDef="let u">{{u.createdAt | date:'short'}}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let u">
      <button mat-icon-button color="primary" (click)="manageRoles(u)" title="Manage Roles">
        <mat-icon>badge</mat-icon>
      </button>
      <button mat-icon-button color="accent" (click)="managePermissions(u)" title="Manage Permissions">
        <mat-icon>security</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleStatus(u.id)" [title]="u.enabled ? 'Disable' : 'Enable'">
        <mat-icon>{{u.enabled ? 'block' : 'check_circle'}}</mat-icon>
      </button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns;"></tr>
</table>
