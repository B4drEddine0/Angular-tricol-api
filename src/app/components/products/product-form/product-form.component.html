<h2 mat-dialog-title>{{data ? 'Edit' : 'Add'}} Product</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Reference</mat-label>
      <input matInput formControlName="reference">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Unit Price</mat-label>
      <input matInput formControlName="unitPrice" type="number">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Unit of Measure</mat-label>
      <input matInput formControlName="unitOfMeasure">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Reorder Point</mat-label>
      <input matInput formControlName="reorderPoint" type="number">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
