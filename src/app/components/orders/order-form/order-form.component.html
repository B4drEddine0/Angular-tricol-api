<h2 mat-dialog-title>{{data ? 'Edit' : 'Create'}} Order</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Supplier</mat-label>
      <mat-select formControlName="supplierId">
        @for (s of suppliers; track s.id) {
          <mat-option [value]="s.id">{{s.raisonSociale}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="2"></textarea>
    </mat-form-field>
    <h3>Order Lines</h3>
    <div formArrayName="orderLines">
      @for (line of orderLines.controls; track $index) {
        <div [formGroupName]="$index" class="order-line">
          <mat-form-field appearance="outline">
            <mat-label>Product</mat-label>
            <mat-select formControlName="productId">
              @for (p of products; track p.id) {
                <mat-option [value]="p.id">{{p.reference}} - {{p.name}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantityOrdered">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Unit Price</mat-label>
            <input matInput type="number" formControlName="unitPurchasePrice">
          </mat-form-field>
          <button mat-icon-button color="warn" type="button" (click)="removeLine($index)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      }
    </div>
    <button mat-button type="button" (click)="addLine()">
      <mat-icon>add</mat-icon> Add Line
    </button>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
