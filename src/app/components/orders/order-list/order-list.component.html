<div class="page-header">
  <h1>Supplier Orders</h1>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon> New Order
  </button>
</div>
<table mat-table [dataSource]="orders" class="mat-elevation-z2">
  <ng-container matColumnDef="orderNumber">
    <th mat-header-cell *matHeaderCellDef>Order #</th>
    <td mat-cell *matCellDef="let o">{{o.orderNumber}}</td>
  </ng-container>
  <ng-container matColumnDef="orderDate">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let o">{{o.orderDate | date:'short'}}</td>
  </ng-container>
  <ng-container matColumnDef="supplier">
    <th mat-header-cell *matHeaderCellDef>Supplier</th>
    <td mat-cell *matCellDef="let o">{{o.supplierName || o.supplier?.raisonSociale || '-'}}</td>
  </ng-container>
  <ng-container matColumnDef="totalAmount">
    <th mat-header-cell *matHeaderCellDef>Amount</th>
    <td mat-cell *matCellDef="let o">{{o.totalAmount | number:'1.2-2'}}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let o">
      <mat-chip [class]="'status-' + o.status">{{o.status}}</mat-chip>
    </td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let o">
      @if (o.status === 'EN_ATTENTE') {
        <button mat-icon-button color="primary" (click)="openDialog(o)" title="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="accent" (click)="validate(o.id)" title="Validate">
          <mat-icon>check_circle</mat-icon>
        </button>
        <button mat-icon-button (click)="cancel(o.id)" title="Cancel">
          <mat-icon>cancel</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="delete(o.id)" title="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      } @else if (o.status === 'VALIDEE') {
        <button mat-icon-button color="accent" (click)="receive(o.id)" title="Receive">
          <mat-icon>local_shipping</mat-icon>
        </button>
      } @else {
        <span>-</span>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns;"></tr>
</table>
