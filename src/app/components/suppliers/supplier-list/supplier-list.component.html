<div class="page-header">
  <h1>Suppliers Management</h1>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon> Add Supplier
  </button>
</div>
<table mat-table [dataSource]="suppliers" class="mat-elevation-z2">
  <ng-container matColumnDef="raisonSociale">
    <th mat-header-cell *matHeaderCellDef>Company</th>
    <td mat-cell *matCellDef="let s">{{s.raisonSociale}}</td>
  </ng-container>
  <ng-container matColumnDef="contactPerson">
    <th mat-header-cell *matHeaderCellDef>Contact</th>
    <td mat-cell *matCellDef="let s">{{s.contactPerson}}</td>
  </ng-container>
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let s">{{s.email}}</td>
  </ng-container>
  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef>Phone</th>
    <td mat-cell *matCellDef="let s">{{s.phone}}</td>
  </ng-container>
  <ng-container matColumnDef="city">
    <th mat-header-cell *matHeaderCellDef>City</th>
    <td mat-cell *matCellDef="let s">{{s.city}}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let s">
      <button mat-icon-button color="primary" (click)="openDialog(s)"><mat-icon>edit</mat-icon></button>
      <button mat-icon-button color="warn" (click)="delete(s.id)"><mat-icon>delete</mat-icon></button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns;"></tr>
</table>
