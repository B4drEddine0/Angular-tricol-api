<div class="dashboard">
  @if (userRole === 'ADMIN') {
    <app-admin-dashboard></app-admin-dashboard>
  } @else if (userRole === 'RESPONSABLE_ACHATS') {
    <app-achats-dashboard></app-achats-dashboard>
  } @else if (userRole === 'MAGASINIER') {
    <app-magasinier-dashboard></app-magasinier-dashboard>
  } @else if (userRole === 'CHEF_ATELIER') {
    <app-chef-dashboard></app-chef-dashboard>
  } @else {
    <h1>Welcome to TRICOL Supply Chain</h1>
    <p>Please contact your administrator to assign you a role.</p>
  }
</div>
